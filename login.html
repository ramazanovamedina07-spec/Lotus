<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Lotus</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">LOTUS</div>
                <p class="auth-subtitle">Войдите в свой аккаунт</p>
            </div>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="ivan@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Ваш пароль" required>
                </div>
                
                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Запомнить меня
                    </label>
                    <a href="#" class="forgot-password">Забыли пароль?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">Войти</button>
            </form>
            
            <div class="auth-footer">
                <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
        </div>
        
        <div class="auth-philosophy">
            <div class="philosophy-content">
                <h2>Добро пожаловать в Lotus</h2>
                <div class="lotus-quote">
                    <i class="fas fa-spa"></i>
                    <blockquote>
                        "Как лотос цветет вопреки обстоятельствам, 
                        так и наша косметика помогает вашей коже сиять в любых условиях."
                    </blockquote>
                </div>
            </div>
        </div>
    </div>
    
    <script src="css/js/api.js"></script>
    <script src="css/js/auth.js"></script>
</body>
</html>
